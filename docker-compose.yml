version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    container_name: triage_backend
    ports:
      - "8000:8000"
    env_file:
      - .env # only pulls OPENAI_API_KEY
    volumes:
      - ./sessions:/app/sessions
      - ./system_prompt.txt:/app/system_prompt.txt
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Frontend/Dockerfile
    container_name: triage_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000 # hardcoded, not from .env
    restart: unless-stopped
